server:
  proxied: true

presets:
    gruvbox-dark:
      background-color: 0 0 16
      primary-color: 43 59 81
      positive-color: 61 66 44
      negative-color: 6 96 59

    zebra:
      light: true
      background-color: 0 0 95
      primary-color: 0 0 10
      negative-color: 0 90 50
pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar

      - size: full
        widgets:
          - type: weather
            location: Poznan, Poland  # change this

      - size: small
        widgets:
          - type: clock
            timezones:
              - timezone: Europe/Warsaw
                label: Home
